<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Hospital Appointment Booking</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🏥 Hospital Appointment Booking</h1>

    <!-- Doctor Cards -->

    <div class="doctor-card">
      <h2>Dr. Priya Sharma</h2>
      <p>Cardiologist</p>
    </div>

    <div class="doctor-card">
      <h2>Dr. Rahul Verma</h2>
      <p>Neurologist</p>
    </div>

    <div class="doctor-card">
      <h2>Dr. Anjali Rao</h2>
      <p>Dentist</p>
    </div>


    <!-- Appointment Form -->

    <form id="appointmentForm">

      <input type="text"
             id="name"
             placeholder="Enter Your Name">


      <!-- Doctor Selection -->

      <select id="doctor">

        <option value="">
          Select Doctor
        </option>

        <option>
          Dr. Priya Sharma - Cardiologist
        </option>

        <option>
          Dr. Rahul Verma - Neurologist
        </option>

        <option>
          Dr. Anjali Rao - Dentist
        </option>

      </select>


      <!-- Date -->

      <input type="date"
             id="date">


      <!-- Time Selection -->

      <select id="time">

        <option value="">
          Select Time
        </option>

        <option>10:00 AM</option>
        <option>11:00 AM</option>
        <option>1:00 PM</option>
        <option>3:00 PM</option>

      </select>


      <button type="submit">
        Book Appointment
      </button>

    </form>


    <!-- Output Message -->

    <p id="message"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
